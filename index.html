<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>乗換案内</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<style>
:root {
  --blue: #2563eb;
  --blue-dark: #1d4ed8;
  --bg: #f1f5f9;
  --card: #fff;
  --text: #1e293b;
  --muted: #94a3b8;
  --border: #e2e8f0;
  --green: #16a34a;
  --orange: #ea580c;
  --red: #dc2626;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-text-size-adjust: 100%;
}

/* Header */
.header {
  background: linear-gradient(135deg, #0f172a, #1e3a5f);
  color: white;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header svg { width: 22px; height: 22px; }
.header h1 { font-size: 17px; font-weight: 600; }
.header .badge {
  margin-left: auto;
  font-size: 10px;
  background: rgba(255,255,255,0.15);
  padding: 2px 8px;
  border-radius: 10px;
}

/* Search Card */
.search-card {
  background: var(--card);
  margin: 12px;
  border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  overflow: hidden;
}
.station-fields {
  padding: 12px 12px 0;
}
.field-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  position: relative;
}
.field-label {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}
.field-label.dep { background: var(--green); }
.field-label.via { background: var(--orange); }
.field-label.arr { background: var(--red); }
.field-input {
  flex: 1;
  position: relative;
}
.field-input input {
  width: 100%;
  padding: 9px 32px 9px 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 15px;
  outline: none;
  background: #f8fafc;
  transition: border-color 0.15s;
}
.field-input input:focus {
  border-color: var(--blue);
  background: white;
}
.field-input input::placeholder { color: var(--muted); }
.field-clear {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  border: none;
  background: #cbd5e1;
  color: white;
  border-radius: 50%;
  font-size: 12px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.field-input input:not(:placeholder-shown) ~ .field-clear { display: flex; }
.remove-via {
  width: 28px;
  height: 28px;
  border: none;
  background: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  flex-shrink: 0;
}

/* Autocomplete */
.ac-dropdown {
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  max-height: 220px;
  overflow-y: auto;
  z-index: 50;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  margin-top: 4px;
}
.ac-dropdown.show { display: block; }
.ac-item {
  padding: 10px 12px;
  border-bottom: 1px solid #f8fafc;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ac-item:active { background: #eff6ff; }
.ac-item .ac-name { font-size: 14px; font-weight: 500; }
.ac-item .ac-sub { font-size: 11px; color: var(--muted); }

/* Controls row */
.controls {
  display: flex;
  padding: 8px 12px;
  gap: 8px;
  border-top: 1px solid var(--border);
}
.add-via-btn {
  font-size: 13px;
  color: var(--blue);
  background: none;
  border: 1px dashed var(--blue);
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
}
.swap-btn {
  font-size: 13px;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  cursor: pointer;
  margin-left: auto;
}
.search-btn {
  width: 100%;
  padding: 13px;
  background: var(--blue);
  color: white;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.search-btn:active { background: var(--blue-dark); }
.search-btn:disabled { background: #94a3b8; }

/* Results */
.results { padding: 0 12px 20px; }
.route-card {
  background: var(--card);
  border-radius: 14px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  overflow: hidden;
}
.route-summary {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.route-summary .time {
  font-size: 22px;
  font-weight: 700;
  color: var(--blue);
}
.route-summary .meta {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}
.route-detail {
  padding: 0;
}
.route-detail.collapsed { display: none; }
.toggle-detail {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  font-size: 12px;
  color: var(--blue);
  cursor: pointer;
  border-top: 1px solid var(--border);
  background: #f8fafc;
}

/* Route steps */
.step {
  display: flex;
  align-items: stretch;
}
.step-line {
  width: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
}
.step-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--blue);
  border: 3px solid white;
  box-shadow: 0 0 0 2px var(--blue);
  z-index: 2;
  flex-shrink: 0;
}
.step-dot.transfer { background: var(--orange); box-shadow: 0 0 0 2px var(--orange); }
.step-dot.walk { background: var(--muted); box-shadow: 0 0 0 2px var(--muted); }
.step-dot.end { background: var(--red); box-shadow: 0 0 0 2px var(--red); }
.step-bar {
  width: 3px;
  flex: 1;
  min-height: 20px;
}
.step-bar.rail { background: var(--blue); }
.step-bar.transfer { background: var(--orange); background: repeating-linear-gradient(to bottom, var(--orange) 0,var(--orange) 4px,transparent 4px,transparent 8px); }
.step-bar.walk { background: repeating-linear-gradient(to bottom, var(--muted) 0,var(--muted) 3px,transparent 3px,transparent 6px); }
.step-bar.none { background: none; }
.step-content {
  flex: 1;
  padding: 4px 16px 14px 10px;
  min-width: 0;
}
.step-station {
  font-size: 15px;
  font-weight: 600;
}
.step-info {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}
.step-info .line-tag {
  display: inline-block;
  background: #eff6ff;
  color: var(--blue);
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 500;
  font-size: 11px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }
.no-route {
  text-align: center;
  padding: 24px;
  color: var(--red);
  font-size: 14px;
}

/* Time selector */
.time-selector {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
}
.time-selector select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  background: #f8fafc;
}
.time-selector input[type="time"] {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  background: #f8fafc;
}

/* Status bar */
.status-bar {
  text-align: center;
  padding: 6px;
  font-size: 11px;
  color: var(--muted);
}
</style>
</head>
<body>

<div class="header">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="4" y="3" width="16" height="14" rx="2"/><path d="M4 10h16"/><path d="M8 17v4M16 17v4M6 21h4M14 21h4"/>
  </svg>
  <h1>乗換案内</h1>
  <span class="badge" id="badge">読込中</span>
</div>

<div class="search-card">
  <div class="station-fields" id="station-fields">
    <!-- Departure -->
    <div class="field-row" data-role="dep">
      <span class="field-label dep">発</span>
      <div class="field-input">
        <input type="text" placeholder="出発駅" autocomplete="off">
        <button class="field-clear" onclick="clearField(this)">&times;</button>
        <div class="ac-dropdown"></div>
      </div>
    </div>
    <!-- Arrival -->
    <div class="field-row" data-role="arr">
      <span class="field-label arr">着</span>
      <div class="field-input">
        <input type="text" placeholder="到着駅" autocomplete="off">
        <button class="field-clear" onclick="clearField(this)">&times;</button>
        <div class="ac-dropdown"></div>
      </div>
    </div>
  </div>
  <!-- Time selector -->
  <div class="time-selector">
    <select id="time-type">
      <option value="dep">出発</option>
      <option value="arr">到着</option>
      <option value="now">現在時刻</option>
    </select>
    <input type="time" id="time-input" value="">
  </div>
  <div class="controls">
    <button class="add-via-btn" onclick="addVia()">+ 経由駅</button>
    <button class="swap-btn" onclick="swapDepArr()">入替</button>
  </div>
  <button class="search-btn" id="search-btn" onclick="doSearch()" disabled>検索</button>
</div>

<div class="results" id="results">
  <div class="empty-state">
    <div class="icon">&#128644;</div>
    <p>駅名を入力して経路を検索</p>
  </div>
</div>

<div class="status-bar" id="status">データ読み込み中...</div>

<script>
// === Global State ===
let graph = null;
let freqData = null;
const selectedStations = {}; // fieldId -> stationIndex

// Set default time to now
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('time-input').value = `${hh}:${mm}`;
  document.getElementById('time-type').value = 'now';
});

// === Data Loading ===
// Load supplementary data
let throughPairs = new Set();
let trainTypes = null;
let fareData = null;
fetch('frequency.json?v=1').then(r => r.json()).then(d => { freqData = d; });
fetch('train_types.json?v=1').then(r => r.json()).then(d => { trainTypes = d; });
fetch('fares.json?v=1').then(r => r.json()).then(d => { fareData = d; });
fetch('through_service.json?v=1').then(r => r.json()).then(d => {
  for (const [a, b] of d.pairs) {
    throughPairs.add(a + '|' + b);
    throughPairs.add(b + '|' + a);
  }
  console.log(`Through-service pairs loaded: ${d.pairs.length}`);
});

fetch('graph.json?v=4')
  .then(r => r.json())
  .then(data => {
    graph = data;
    // Pre-build name index for fast search
    graph._nameIndex = [];
    let withLines = 0;
    for (let i = 0; i < graph.stations.length; i++) {
      const s = graph.stations[i];
      if (s.l && s.l.length > 0) withLines++;
      graph._nameIndex.push({
        id: i,
        name: s.n,
        nameEn: (s.e || '').toLowerCase(),
        pref: s.p,
        lines: s.l,
      });
    }
    document.getElementById('badge').textContent = `${graph.stats.stations}駅`;
    document.getElementById('status').textContent =
      `${graph.stats.stations}駅 / ${graph.stats.lines}路線 / オフライン対応`;
    document.getElementById('search-btn').disabled = false;
    console.log(`Graph loaded: ${graph.stats.stations} stations, ${withLines} with lines, ${graph.stats.lines} lines`);
    initAutocomplete();
  })
  .catch((e) => {
    document.getElementById('status').textContent = 'データ読み込みエラー: ' + e.message;
  });

// === Autocomplete ===
function searchStations(query) {
  if (!graph || query.length < 1) return [];
  const q = query.toLowerCase();
  const results = [];
  for (const s of graph._nameIndex) {
    if (s.name.includes(query) || s.nameEn.includes(q)) {
      results.push(s);
      if (results.length >= 12) break;
    }
  }
  results.sort((a, b) => {
    if (a.name === query && b.name !== query) return -1;
    if (b.name === query && a.name !== query) return 1;
    if (a.name.startsWith(query) && !b.name.startsWith(query)) return -1;
    if (b.name.startsWith(query) && !a.name.startsWith(query)) return 1;
    return a.name.length - b.name.length;
  });
  return results;
}

function initAutocomplete() {
  document.querySelectorAll('.field-row').forEach(setupFieldAC);
}

function setupFieldAC(row) {
  const input = row.querySelector('input');
  const dropdown = row.querySelector('.ac-dropdown');
  if (!input || !dropdown) return;

  const fieldId = input.closest('.field-row').dataset.role + '-' +
    Array.from(document.querySelectorAll('.field-row')).indexOf(input.closest('.field-row'));

  input.dataset.fieldId = fieldId;

  input.addEventListener('input', () => {
    delete selectedStations[input.dataset.fieldId];
    const results = searchStations(input.value);
    if (results.length === 0 || !input.value) {
      dropdown.classList.remove('show');
      return;
    }
    dropdown.innerHTML = results.map(s => `
      <div class="ac-item" data-id="${s.id}">
        <div>
          <div class="ac-name">${s.name}</div>
          <div class="ac-sub">${s.pref ? s.pref + ' / ' : ''}${s.lines.length ? s.lines[0] : ''}</div>
        </div>
      </div>
    `).join('');
    dropdown.classList.add('show');

    dropdown.querySelectorAll('.ac-item').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const id = parseInt(el.dataset.id);
        input.value = graph.stations[id].n;
        selectedStations[input.dataset.fieldId] = id;
        dropdown.classList.remove('show');
      });
    });
  });

  input.addEventListener('blur', () => {
    setTimeout(() => dropdown.classList.remove('show'), 150);
  });
}

// === Via Stations ===
let viaCount = 0;
function addVia() {
  if (viaCount >= 3) return;
  viaCount++;
  const arrRow = document.querySelector('[data-role="arr"]');
  const via = document.createElement('div');
  via.className = 'field-row';
  via.dataset.role = 'via';
  via.innerHTML = `
    <span class="field-label via">経</span>
    <div class="field-input">
      <input type="text" placeholder="経由駅" autocomplete="off">
      <button class="field-clear" onclick="clearField(this)">&times;</button>
      <div class="ac-dropdown"></div>
    </div>
    <button class="remove-via" onclick="removeVia(this)">&times;</button>
  `;
  arrRow.parentNode.insertBefore(via, arrRow);
  setupFieldAC(via);
  via.querySelector('input').focus();
}

function removeVia(btn) {
  const row = btn.closest('.field-row');
  const input = row.querySelector('input');
  if (input && input.dataset.fieldId) {
    delete selectedStations[input.dataset.fieldId];
  }
  row.remove();
  viaCount--;
}

function clearField(btn) {
  const input = btn.previousElementSibling;
  input.value = '';
  if (input.dataset.fieldId) delete selectedStations[input.dataset.fieldId];
  input.focus();
}

function swapDepArr() {
  const rows = document.querySelectorAll('.field-row');
  const depRow = rows[0];
  const arrRow = rows[rows.length - 1];
  const depInput = depRow.querySelector('input');
  const arrInput = arrRow.querySelector('input');
  const tmpVal = depInput.value;
  const tmpId = selectedStations[depInput.dataset.fieldId];
  depInput.value = arrInput.value;
  selectedStations[depInput.dataset.fieldId] = selectedStations[arrInput.dataset.fieldId];
  arrInput.value = tmpVal;
  selectedStations[arrInput.dataset.fieldId] = tmpId;
}

// === Dijkstra with optional banned edges ===
function dijkstra(startId, endId, bannedEdges) {
  const n = graph.stations.length;
  const dist = new Float64Array(n).fill(Infinity);
  const prev = new Int32Array(n).fill(-1);
  const prevEdgeLine = new Array(n).fill('');
  const visited = new Uint8Array(n);
  dist[startId] = 0;

  const heap = [[0, startId]];
  function push(d, v) {
    heap.push([d, v]);
    let i = heap.length - 1;
    while (i > 0) {
      const p = (i - 1) >> 1;
      if (heap[i][0] >= heap[p][0]) break;
      [heap[i], heap[p]] = [heap[p], heap[i]];
      i = p;
    }
  }
  function pop() {
    const top = heap[0];
    const last = heap.pop();
    if (heap.length > 0) {
      heap[0] = last;
      let i = 0;
      while (true) {
        let s = i, l = 2*i+1, r = 2*i+2;
        if (l < heap.length && heap[l][0] < heap[s][0]) s = l;
        if (r < heap.length && heap[r][0] < heap[s][0]) s = r;
        if (s === i) break;
        [heap[i], heap[s]] = [heap[s], heap[i]];
        i = s;
      }
    }
    return top;
  }

  while (heap.length > 0) {
    const [d, u] = pop();
    if (visited[u]) continue;
    visited[u] = 1;
    if (u === endId) break;

    const neighbors = graph.edges[u];
    if (!neighbors) continue;

    for (const [v, w, line] of neighbors) {
      if (visited[v]) continue;
      // Check banned edges
      if (bannedEdges && bannedEdges.has(u + ':' + v)) continue;

      // Apply speed factor for faster trains
      const tt = getTrainType(line);
      const effectiveW = w * tt.speed_factor;

      // Transfer penalty (skip if through-service)
      let penalty = 0;
      if (prev[u] !== -1 && prevEdgeLine[u] && prevEdgeLine[u] !== '_rail' &&
          line !== prevEdgeLine[u] && line !== '_rail') {
        if (!isThroughService(prevEdgeLine[u], line)) {
          penalty = 500;
        }
      }
      const nd = d + effectiveW + penalty;
      if (nd < dist[v]) {
        dist[v] = nd;
        prev[v] = u;
        prevEdgeLine[v] = line;
        push(nd, v);
      }
    }
  }

  if (dist[endId] === Infinity) return null;

  const path = [];
  let cur = endId;
  while (cur !== -1) {
    path.unshift({ id: cur, line: prevEdgeLine[cur] });
    cur = prev[cur];
  }
  return { path, distance: dist[endId] };
}

// === Find K alternative routes ===
// Uses edge-penalty method: after finding shortest path,
// penalize its edges and search again for a different route
function findKRoutes(startId, endId, k = 3) {
  const routes = [];
  const usedEdgeSets = [];

  // First: shortest path with no bans
  const first = dijkstra(startId, endId, null);
  if (!first) return routes;
  routes.push(first);

  // Extract path signature (set of line segments) to check uniqueness
  function routeSignature(route) {
    const segs = detectLineSegments(route.path);
    return segs.map(s => s.line).join('|');
  }
  const seenSignatures = new Set([routeSignature(first)]);

  // Try banning different portions of previous routes
  for (let attempt = 0; attempt < k * 8 && routes.length < k; attempt++) {
    const sourceRoute = routes[attempt % routes.length];
    const pathIds = sourceRoute.path.map(p => p.id);

    // Ban edges around a "spur point" — a station partway through the route
    // Each attempt uses a different spur point
    const spurIdx = Math.floor((attempt / routes.length + 1) * pathIds.length / (k * 2));
    if (spurIdx <= 0 || spurIdx >= pathIds.length - 1) continue;

    const banned = new Set();
    // Ban the edge at the spur point from all found routes
    for (const r of routes) {
      const rIds = r.path.map(p => p.id);
      for (let i = 0; i < rIds.length - 1; i++) {
        // Ban edges that share the prefix up to the spur
        if (i < spurIdx && i < pathIds.length - 1 && rIds[i] === pathIds[i]) {
          continue; // Same prefix, don't ban yet
        }
        if (i >= spurIdx - 1 && i < spurIdx + 2 && i < rIds.length - 1) {
          banned.add(rIds[i] + ':' + rIds[i + 1]);
          banned.add(rIds[i + 1] + ':' + rIds[i]);
        }
      }
    }

    const alt = dijkstra(startId, endId, banned);
    if (!alt) continue;

    // Check the route is meaningfully different
    const sig = routeSignature(alt);
    if (seenSignatures.has(sig)) continue;

    // Check distance isn't absurdly longer (max 3x the shortest)
    if (alt.distance > first.distance * 3) continue;

    seenSignatures.add(sig);
    routes.push(alt);
  }

  return routes; // Don't sort here, sort later by time
}

// Find all station IDs matching a name exactly
function findAllByName(name) {
  const ids = [];
  for (let i = 0; i < graph.stations.length; i++) {
    if (graph.stations[i].n === name) ids.push(i);
  }
  return ids;
}

// === Search ===
function doSearch() {
  const rows = document.querySelectorAll('.field-row');
  const waypointCandidates = [];

  for (const row of rows) {
    const input = row.querySelector('input');
    const fid = input.dataset.fieldId;
    const sid = selectedStations[fid];

    if (sid === undefined || sid === null) {
      const text = input.value.trim();
      if (!text) {
        if (row.dataset.role !== 'via') {
          alert(row.dataset.role === 'dep' ? '出発駅を選択してください' : '到着駅を選択してください');
          return;
        }
        continue;
      }
      const allIds = findAllByName(text);
      if (allIds.length > 0) {
        waypointCandidates.push(allIds);
      } else {
        const matches = searchStations(text);
        if (matches.length > 0) {
          const name = matches[0].name;
          waypointCandidates.push(findAllByName(name));
          input.value = name;
        } else {
          alert(`「${text}」が見つかりません`);
          return;
        }
      }
    } else {
      const name = graph.stations[sid].n;
      const allIds = findAllByName(name);
      waypointCandidates.push(allIds.length > 1 ? allIds : [sid]);
    }
  }

  if (waypointCandidates.length < 2) {
    alert('出発駅と到着駅を入力してください');
    return;
  }

  // For direct (no via) routes, find multiple alternatives
  if (waypointCandidates.length === 2) {
    const allRoutes = [];
    for (const fid of waypointCandidates[0]) {
      for (const tid of waypointCandidates[1]) {
        if (fid === tid) continue;
        const routes = findKRoutes(fid, tid, 6);
        allRoutes.push(...routes);
      }
    }

    // Deduplicate by line signature
    const unique = [];
    const sigs = new Set();
    for (const r of allRoutes) {
      const segs = detectLineSegments(r.path);
      const sig = segs.map(s => s.line).join('|');
      if (!sigs.has(sig)) {
        sigs.add(sig);
        // Pre-calculate estimated time for sorting
        const segTimes = calculateTimes(r.path, segs, getSearchTime().minutes);
        r._estTime = segTimes[segTimes.length - 1].arrTime - segTimes[0].depTime;
        r._transfers = 0;
        for (let i = 1; i < segs.length; i++) {
          if (!isThroughService(segs[i-1].line, segs[i].line)) r._transfers++;
        }
        unique.push(r);
      }
    }

    // Sort by: time first, then transfers
    unique.sort((a, b) => {
      const timeDiff = a._estTime - b._estTime;
      if (Math.abs(timeDiff) > 5) return timeDiff; // >5min差なら時間優先
      return a._transfers - b._transfers; // 時間近ければ乗換少ない方
    });

    if (unique.length === 0) {
      const fn = graph.stations[waypointCandidates[0][0]].n;
      const tn = graph.stations[waypointCandidates[1][0]].n;
      document.getElementById('results').innerHTML =
        `<div class="no-route">${fn} → ${tn} の経路が見つかりません</div>`;
      return;
    }
    renderMultipleResults(unique);
  } else {
    // Via route: single best path through all waypoints
    let totalPath = [];
    let totalDist = 0;

    for (let i = 0; i < waypointCandidates.length - 1; i++) {
      const fromC = waypointCandidates[i];
      const toC = waypointCandidates[i + 1];
      let bestResult = null;
      for (const fid of fromC) {
        for (const tid of toC) {
          if (fid === tid) continue;
          const result = dijkstra(fid, tid, null);
          if (result && (!bestResult || result.distance < bestResult.distance)) {
            bestResult = result;
          }
        }
      }
      if (!bestResult) {
        document.getElementById('results').innerHTML =
          `<div class="no-route">経路が見つかりません</div>`;
        return;
      }
      if (totalPath.length > 0) {
        totalPath = totalPath.concat(bestResult.path.slice(1));
      } else {
        totalPath = bestResult.path;
      }
      totalDist += bestResult.distance;
    }
    renderMultipleResults([{ path: totalPath, distance: totalDist }]);
  }
}

// === Check if two lines have through-service (直通運転) ===
function isThroughService(lineA, lineB) {
  if (!lineA || !lineB || lineA === lineB) return false;
  return throughPairs.has(lineA + '|' + lineB);
}

// === Detect line segments using station line membership ===
function detectLineSegments(path) {
  // For each pair of consecutive stations, find the shared line.
  // When the shared line changes AND it's not through-service, that's a transfer.
  const rawSegments = []; // {lineName, from, to}
  let currentLine = '';
  let segStart = 0;

  for (let i = 1; i < path.length; i++) {
    const prevStn = graph.stations[path[i-1].id];
    const currStn = graph.stations[path[i].id];

    // Find shared lines between two adjacent stations
    const prevLines = new Set(prevStn.l || []);
    const currLines = currStn.l || [];
    const shared = currLines.filter(l => prevLines.has(l));

    // Also check edge line
    const edgeLine = path[i].line;
    let bestLine = '_rail';

    if (shared.length > 0) {
      if (currentLine && shared.includes(currentLine)) {
        bestLine = currentLine;
      } else {
        bestLine = shared[0];
      }
    } else if (edgeLine && edgeLine !== '_rail') {
      bestLine = edgeLine;
    }

    if (bestLine !== currentLine && i > 1) {
      rawSegments.push({ line: currentLine, from: segStart, to: i - 1 });
      segStart = i - 1;
    }
    currentLine = bestLine;
  }
  rawSegments.push({ line: currentLine, from: segStart, to: path.length - 1 });

  return rawSegments;
}

// === Time calculation ===
function getTimePeriod(hour) {
  if (hour >= 7 && hour < 9) return 'rush';
  if (hour >= 17 && hour < 19) return 'rush';
  if (hour >= 9 && hour < 17) return 'day';
  if (hour >= 19 && hour < 23) return 'night';
  return 'early'; // 5-7 or 23-5
}

function getFrequency(lineName, hour) {
  if (!freqData) return 10;
  const period = getTimePeriod(hour);
  const lineFreq = freqData.lines[lineName];
  if (lineFreq) return lineFreq[period];
  return freqData.default[period];
}

// Get best train type for a line
function getTrainType(lineName) {
  if (!trainTypes || !trainTypes.types[lineName]) return { type: '各停', speed_factor: 1.0 };
  // Return the fastest type available
  const types = trainTypes.types[lineName];
  return types[0]; // First entry is fastest
}

function calculateTimes(path, lineSegments, startMinutes) {
  const segTimes = [];
  let currentTime = startMinutes;

  for (let si = 0; si < lineSegments.length; si++) {
    const seg = lineSegments[si];
    const stationCount = seg.to - seg.from;

    // Wait for next train
    const hour = Math.floor(currentTime / 60) % 24;
    const freq = getFrequency(seg.line, hour);
    const prevSeg = si > 0 ? lineSegments[si - 1] : null;
    const isThrough = prevSeg && isThroughService(prevSeg.line, seg.line);
    const waitTime = (si === 0 || isThrough) ? 0 : Math.round(freq / 2);

    const depTime = currentTime + waitTime;

    // Travel time with train type speed factor
    const tt = getTrainType(seg.line);
    const baseTime = stationCount * 2.5;
    const travelTime = baseTime * tt.speed_factor;
    const arrTime = depTime + travelTime;

    segTimes.push({
      depTime: Math.round(depTime),
      arrTime: Math.round(arrTime),
      waitTime,
      travelTime: Math.round(travelTime),
      trainType: tt.type,
    });

    currentTime = arrTime;
    if (si < lineSegments.length - 1 && !isThroughService(seg.line, lineSegments[si+1].line)) {
      currentTime += 3; // Transfer walk time only for real transfers
    }
  }

  return segTimes;
}

// Calculate fare for a route
function calculateFare(path, lineSegments) {
  if (!fareData) return null;

  let totalFare = 0;
  const fareBreakdown = [];

  // Build company lookup
  const lineToCompany = {};
  for (const [company, data] of Object.entries(fareData.companies)) {
    for (const lineName of data.match) {
      lineToCompany[lineName] = company;
    }
  }

  // Calculate distance per company segment
  // Through-service does NOT merge companies for fare — you pay each company separately
  let currentCompany = '';
  let companyDist = 0;

  for (let si = 0; si < lineSegments.length; si++) {
    const seg = lineSegments[si];
    const company = lineToCompany[seg.line] || '';

    // Calculate segment distance
    let segDist = 0;
    for (let i = seg.from + 1; i <= seg.to; i++) {
      const fromId = path[i-1].id;
      const toId = path[i].id;
      const edges = graph.edges[fromId];
      if (edges) {
        const e = edges.find(e => e[0] === toId);
        if (e) segDist += e[1];
      }
    }
    const segDistKm = segDist / 1000;

    // Same company: accumulate distance
    if (company === currentCompany) {
      companyDist += segDistKm;
    } else {
      // Different company: finalize previous, start new
      if (currentCompany && companyDist > 0) {
        const fare = lookupFare(currentCompany, companyDist);
        totalFare += fare;
        fareBreakdown.push({ company: currentCompany, dist: companyDist, fare });
      }
      currentCompany = company || 'その他';
      companyDist = segDistKm;
    }
  }

  // Finalize last
  if (currentCompany && companyDist > 0) {
    const fare = lookupFare(currentCompany, companyDist);
    totalFare += fare;
    fareBreakdown.push({ company: currentCompany, dist: companyDist, fare });
  }

  return { total: totalFare, breakdown: fareBreakdown };
}

function lookupFare(company, distKm) {
  if (!fareData) return Math.round(distKm * 25);
  const companyData = fareData.companies[company];
  if (!companyData) return Math.round(distKm * (fareData.default_fare_per_km || 25));
  const table = companyData.ic_fare;
  for (const [maxDist, fare] of table) {
    if (distKm <= maxDist) return fare;
  }
  return table[table.length - 1][1]; // Max fare
}

function formatTime(minutes) {
  const h = Math.floor(minutes / 60) % 24;
  const m = minutes % 60;
  return `${String(h).padStart(2,'0')}:${String(Math.round(m)).padStart(2,'0')}`;
}

function getSearchTime() {
  const type = document.getElementById('time-type').value;
  const timeInput = document.getElementById('time-input').value;

  if (type === 'now' || !timeInput) {
    const now = new Date();
    return { type: 'dep', minutes: now.getHours() * 60 + now.getMinutes() };
  }

  const [h, m] = timeInput.split(':').map(Number);
  return { type, minutes: h * 60 + m };
}

// Line color hash for visual distinction
const LINE_COLORS = [
  '#2563eb', '#dc2626', '#16a34a', '#9333ea', '#ea580c',
  '#0891b2', '#be185d', '#4f46e5', '#ca8a04', '#059669',
];
function lineColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
  return LINE_COLORS[Math.abs(hash) % LINE_COLORS.length];
}

// === Rendering ===
function renderOneRoute(result, index, searchTime) {
  const { path, distance } = result;
  const lineSegments = detectLineSegments(path);

  // Calculate times
  const segTimes = calculateTimes(path, lineSegments, searchTime.minutes);
  const depTimeStr = formatTime(segTimes[0].depTime);
  const arrTimeStr = formatTime(segTimes[segTimes.length - 1].arrTime);
  const totalMin = Math.round(segTimes[segTimes.length - 1].arrTime - segTimes[0].depTime);
  // Count real transfers (exclude through-service)
  let transferCount = 0;
  for (let i = 1; i < lineSegments.length; i++) {
    if (!isThroughService(lineSegments[i-1].line, lineSegments[i].line)) {
      transferCount++;
    }
  }

  const routeId = 'route-' + index;
  let html = `<div class="route-card">`;

  // Fare calculation
  const fareInfo = calculateFare(path, lineSegments);
  const fareStr = fareInfo ? `¥${fareInfo.total.toLocaleString()}` : '';

  // Summary (clickable to toggle detail)
  html += `<div class="route-summary" onclick="toggleRoute('${routeId}')" style="cursor:pointer">
    <div style="flex:1">
      <div style="font-size:20px;font-weight:700;color:var(--blue)">${depTimeStr} → ${arrTimeStr}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:2px">${totalMin}分 / ${transferCount > 0 ? transferCount + '回乗換' : '直通'} / ${(distance/1000).toFixed(1)}km</div>
    </div>
    ${fareStr ? `<div style="font-size:18px;font-weight:700;color:var(--text)">${fareStr}</div>` : ''}
  </div>`;

  // Line summary bar (mini colored line showing route composition)
  const totalStops = path.length - 1;
  html += `<div style="display:flex;height:4px;margin:0 16px 8px;border-radius:2px;overflow:hidden">`;
  for (const seg of lineSegments) {
    const pct = ((seg.to - seg.from) / totalStops * 100).toFixed(1);
    html += `<div style="width:${pct}%;background:${lineColor(seg.line)}"></div>`;
  }
  html += `</div>`;

  // Route line names summary
  const lineNames = lineSegments.map(s => {
    const n = s.line === '_rail' ? '鉄道' : s.line;
    return `<span class="line-tag" style="background:${lineColor(s.line)}11;color:${lineColor(s.line)};margin:2px">${n}</span>`;
  }).join('→');
  html += `<div style="padding:0 16px 10px;font-size:12px;line-height:1.8">${lineNames}</div>`;

  // Detail (collapsed by default for 2nd+ routes)
  const collapsed = index > 0 ? ' collapsed' : '';
  html += `<div class="route-detail${collapsed}" id="${routeId}">`;

  for (let si = 0; si < lineSegments.length; si++) {
    const seg = lineSegments[si];
    const fromStn = graph.stations[path[seg.from].id];
    const toStn = graph.stations[path[seg.to].id];
    const isLast = si === lineSegments.length - 1;
    const stationCount = seg.to - seg.from;
    const lineName = seg.line === '_rail' ? '鉄道' :
                     seg.line === '_transfer' ? '乗換' :
                     seg.line === '_walk' ? '徒歩' : seg.line;
    const color = lineColor(seg.line);

    const st = segTimes[si];
    const depT = formatTime(st.depTime);
    const arrT = formatTime(st.arrTime);

    // Check if next segment is through-service (no transfer needed)
    const nextSeg = si < lineSegments.length - 1 ? lineSegments[si + 1] : null;
    const throughNext = nextSeg && isThroughService(seg.line, nextSeg.line);

    html += `<div class="step">
      <div class="step-line">
        <div class="step-dot" style="background:${color};box-shadow:0 0 0 2px ${color}"></div>
        <div class="step-bar" style="background:${color}"></div>
      </div>
      <div class="step-content">
        <div class="step-station"><span style="color:var(--muted);font-size:12px;margin-right:6px">${depT}</span>${fromStn.n}</div>
        <div class="step-info">
          <span class="line-tag" style="background:${color}11;color:${color}">${lineName}</span>
          ${st.trainType !== '各停' && st.trainType !== '普通' ? `<span style="font-size:11px;color:var(--orange);font-weight:600">${st.trainType}</span>` : ''}
          ${stationCount}駅 ${st.travelTime}分${st.waitTime > 0 ? ` <span style="color:var(--orange)">(待${st.waitTime}分)</span>` : ''}
        </div>
        ${throughNext ? `<div style="margin-top:4px;font-size:11px;color:var(--green);font-weight:500">↓ ${nextSeg.line} に直通・乗換不要</div>` : ''}
      </div>
    </div>`;

    if (isLast) {
      html += `<div class="step">
        <div class="step-line">
          <div class="step-dot end"></div>
          <div class="step-bar none"></div>
        </div>
        <div class="step-content">
          <div class="step-station"><span style="color:var(--muted);font-size:12px;margin-right:6px">${arrT}</span>${toStn.n}</div>
          <div class="step-info">到着</div>
        </div>
      </div>`;
    }
  }

  html += `</div>`; // route-detail
  html += `</div>`; // route-card
  return html;
}

let allFoundRoutes = [];
function renderMultipleResults(routes) {
  allFoundRoutes = routes;
  const searchTime = getSearchTime();
  const showCount = Math.min(3, routes.length);
  let html = '';
  if (routes.length > 1) {
    html += `<div style="padding:4px 16px 0;font-size:13px;color:var(--muted)">${routes.length}件の経路</div>`;
  }
  for (let i = 0; i < showCount; i++) {
    html += renderOneRoute(routes[i], i, searchTime);
  }
  if (routes.length > showCount) {
    html += `<button onclick="showMoreRoutes()" id="show-more-btn" style="
      width:calc(100% - 24px);margin:0 12px 12px;padding:12px;
      background:white;border:1px solid var(--border);border-radius:10px;
      font-size:14px;color:var(--blue);cursor:pointer;font-weight:500;
    ">さらに${routes.length - showCount}件表示</button>`;
  }
  document.getElementById('results').innerHTML = html;
}

function showMoreRoutes() {
  const searchTime = getSearchTime();
  let html = `<div style="padding:4px 16px 0;font-size:13px;color:var(--muted)">${allFoundRoutes.length}件の経路</div>`;
  for (let i = 0; i < allFoundRoutes.length; i++) {
    html += renderOneRoute(allFoundRoutes[i], i, searchTime);
  }
  document.getElementById('results').innerHTML = html;
}

function toggleRoute(routeId) {
  const el = document.getElementById(routeId);
  if (!el) return;
  el.classList.toggle('collapsed');
}

function toggleDetail() {
  // Legacy, kept for compatibility
}

// === Service Worker + Offline ===
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'activated') {
          document.getElementById('status').textContent += ' (更新完了)';
        }
      });
    });
  });

  // Request persistent storage
  if (navigator.storage && navigator.storage.persist) {
    navigator.storage.persist().then(granted => {
      if (granted) {
        console.log('Persistent storage granted');
      } else {
        console.log('Persistent storage denied - cache may be evicted');
      }
    });
  }

  // Check offline readiness
  window.addEventListener('load', async () => {
    if ('caches' in window) {
      const cache = await caches.open('transit-v7');
      const keys = await cache.keys();
      const statusEl = document.getElementById('status');
      if (keys.length >= 4) { // index.html + graph.json + frequency.json + through_service.json minimum
        statusEl.textContent = statusEl.textContent.replace('オフライン対応', 'オフライン準備完了');
        statusEl.style.color = '#16a34a';
      }
    }
  });
}

// Online/offline indicator
window.addEventListener('online', () => {
  document.getElementById('status').style.color = '';
});
window.addEventListener('offline', () => {
  document.getElementById('status').textContent = 'オフラインモード';
  document.getElementById('status').style.color = '#ea580c';
});
