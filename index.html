<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>乗換案内</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<style>
:root {
  --blue: #2563eb;
  --blue-dark: #1d4ed8;
  --bg: #f1f5f9;
  --card: #fff;
  --text: #1e293b;
  --muted: #94a3b8;
  --border: #e2e8f0;
  --green: #16a34a;
  --orange: #ea580c;
  --red: #dc2626;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-text-size-adjust: 100%;
}

/* Header */
.header {
  background: linear-gradient(135deg, #0f172a, #1e3a5f);
  color: white;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header svg { width: 22px; height: 22px; }
.header h1 { font-size: 17px; font-weight: 600; }
.header .badge {
  margin-left: auto;
  font-size: 10px;
  background: rgba(255,255,255,0.15);
  padding: 2px 8px;
  border-radius: 10px;
}

/* Search Card */
.search-card {
  background: var(--card);
  margin: 12px;
  border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  overflow: hidden;
}
.station-fields {
  padding: 12px 12px 0;
}
.field-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  position: relative;
}
.field-label {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}
.field-label.dep { background: var(--green); }
.field-label.via { background: var(--orange); }
.field-label.arr { background: var(--red); }
.field-input {
  flex: 1;
  position: relative;
}
.field-input input {
  width: 100%;
  padding: 9px 32px 9px 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 15px;
  outline: none;
  background: #f8fafc;
  transition: border-color 0.15s;
}
.field-input input:focus {
  border-color: var(--blue);
  background: white;
}
.field-input input::placeholder { color: var(--muted); }
.field-clear {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  border: none;
  background: #cbd5e1;
  color: white;
  border-radius: 50%;
  font-size: 12px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.field-input input:not(:placeholder-shown) ~ .field-clear { display: flex; }
.remove-via {
  width: 28px;
  height: 28px;
  border: none;
  background: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  flex-shrink: 0;
}

/* Autocomplete */
.ac-dropdown {
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  max-height: 220px;
  overflow-y: auto;
  z-index: 50;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  margin-top: 4px;
}
.ac-dropdown.show { display: block; }
.ac-item {
  padding: 10px 12px;
  border-bottom: 1px solid #f8fafc;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ac-item:active { background: #eff6ff; }
.ac-item .ac-name { font-size: 14px; font-weight: 500; }
.ac-item .ac-sub { font-size: 11px; color: var(--muted); }

/* Controls row */
.controls {
  display: flex;
  padding: 8px 12px;
  gap: 8px;
  border-top: 1px solid var(--border);
}
.add-via-btn {
  font-size: 13px;
  color: var(--blue);
  background: none;
  border: 1px dashed var(--blue);
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
}
.swap-btn {
  font-size: 13px;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  cursor: pointer;
  margin-left: auto;
}
.opt-toggles {
  display: flex;
  gap: 14px;
  padding: 0 12px 8px;
  font-size: 13px;
  color: var(--muted);
}
.opt-toggles label {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}
.opt-toggles input { accent-color: var(--blue); }
.search-btn {
  width: 100%;
  padding: 13px;
  background: var(--blue);
  color: white;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.search-btn:active { background: var(--blue-dark); }
.search-btn:disabled { background: #94a3b8; }

/* Results */
.results { padding: 0 12px 20px; }
.route-card {
  background: var(--card);
  border-radius: 14px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  overflow: hidden;
}
.route-summary {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.route-summary .time {
  font-size: 22px;
  font-weight: 700;
  color: var(--blue);
}
.route-summary .meta {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}
.route-detail {
  padding: 0;
}
.route-detail.collapsed { display: none; }
.toggle-detail {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  font-size: 12px;
  color: var(--blue);
  cursor: pointer;
  border-top: 1px solid var(--border);
  background: #f8fafc;
}

/* Route steps */
.step {
  display: flex;
  align-items: stretch;
}
.step-line {
  width: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
}
.step-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--blue);
  border: 3px solid white;
  box-shadow: 0 0 0 2px var(--blue);
  z-index: 2;
  flex-shrink: 0;
}
.step-dot.transfer { background: var(--orange); box-shadow: 0 0 0 2px var(--orange); }
.step-dot.walk { background: var(--muted); box-shadow: 0 0 0 2px var(--muted); }
.step-dot.end { background: var(--red); box-shadow: 0 0 0 2px var(--red); }
.step-bar {
  width: 3px;
  flex: 1;
  min-height: 20px;
}
.step-bar.rail { background: var(--blue); }
.step-bar.transfer { background: var(--orange); background: repeating-linear-gradient(to bottom, var(--orange) 0,var(--orange) 4px,transparent 4px,transparent 8px); }
.step-bar.walk { background: repeating-linear-gradient(to bottom, var(--muted) 0,var(--muted) 3px,transparent 3px,transparent 6px); }
.step-bar.none { background: none; }
.step-content {
  flex: 1;
  padding: 4px 16px 14px 10px;
  min-width: 0;
}
.step-station {
  font-size: 15px;
  font-weight: 600;
}
.step-info {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}
.step-info .line-tag {
  display: inline-block;
  background: #eff6ff;
  color: var(--blue);
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 500;
  font-size: 11px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }
.no-route {
  text-align: center;
  padding: 24px;
  color: var(--red);
  font-size: 14px;
}

/* Time selector */
.time-selector {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
}
.time-selector select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  background: #f8fafc;
}
.time-selector input[type="time"] {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  background: #f8fafc;
}

/* Status bar */
.status-bar {
  text-align: center;
  padding: 6px;
  font-size: 11px;
  color: var(--muted);
}
</style>
</head>
<body>

<div class="header">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="4" y="3" width="16" height="14" rx="2"/><path d="M4 10h16"/><path d="M8 17v4M16 17v4M6 21h4M14 21h4"/>
  </svg>
  <h1>乗換案内</h1>
  <span class="badge" id="badge">読込中</span>
</div>

<div class="search-card">
  <div class="station-fields" id="station-fields">
    <!-- Departure -->
    <div class="field-row" data-role="dep">
      <span class="field-label dep">発</span>
      <div class="field-input">
        <input type="text" placeholder="出発駅" autocomplete="off">
        <button class="field-clear" onclick="clearField(this)">&times;</button>
        <div class="ac-dropdown"></div>
      </div>
    </div>
    <!-- Arrival -->
    <div class="field-row" data-role="arr">
      <span class="field-label arr">着</span>
      <div class="field-input">
        <input type="text" placeholder="到着駅" autocomplete="off">
        <button class="field-clear" onclick="clearField(this)">&times;</button>
        <div class="ac-dropdown"></div>
      </div>
    </div>
  </div>
  <!-- Time selector -->
  <div class="time-selector">
    <select id="time-type">
      <option value="dep">出発</option>
      <option value="arr">到着</option>
      <option value="now">現在時刻</option>
    </select>
    <input type="time" id="time-input" value="">
  </div>
  <div class="controls">
    <button class="add-via-btn" onclick="addVia()">+ 経由駅</button>
    <button class="swap-btn" onclick="swapDepArr()">入替</button>
  </div>
  <div class="opt-toggles">
    <label><input type="checkbox" id="opt-express" checked onchange="saveOpts()"> 特急を使う</label>
    <label><input type="checkbox" id="opt-shinkansen" checked onchange="saveOpts()"> 新幹線を使う</label>
  </div>
  <button class="search-btn" id="search-btn" onclick="doSearch()" disabled>検索</button>
</div>

<div class="results" id="results">
  <div class="empty-state">
    <div class="icon">&#128644;</div>
    <p>駅名を入力して経路を検索</p>
  </div>
</div>

<div class="status-bar" id="status">データ読み込み中...</div>

<script src="router_v3.js?v=3"></script>
<script>
// === Global State ===
let graph = null;
let freqData = null;
const selectedStations = {}; // fieldId -> stationIndex

// Set default time to now
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('time-input').value = `${hh}:${mm}`;
  document.getElementById('time-type').value = 'now';
});

// === Data Loading ===
// 実在列車データ(CSA): trains_v3.bin.gz + meta + graph(駅名) + fares
async function fetchBin(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${url}: ${res.status}`);
  let buf = await res.arrayBuffer();
  const u8 = new Uint8Array(buf);
  if (u8[0] === 0x1f && u8[1] === 0x8b) { // gzip magic → 手動解凍
    const ds = new DecompressionStream('gzip');
    const stream = new Response(buf).body.pipeThrough(ds);
    buf = await new Response(stream).arrayBuffer();
  }
  return buf;
}

(async () => {
  try {
    const [graphData, meta, fares, bin] = await Promise.all([
      fetch('graph_v2.json?v=2').then(r => r.json()),
      fetch('trains_v3_meta.json?v=2').then(r => r.json()),
      fetch('fares.json?v=5').then(r => r.json()),
      fetchBin('trains_v3.bin.gz?v=2'),
    ]);
    graph = graphData;
    // Pre-build name index for fast search
    graph._nameIndex = [];
    for (let i = 0; i < graph.stations.length; i++) {
      const s = graph.stations[i];
      graph._nameIndex.push({
        id: i,
        name: s.n,
        nameEn: (s.e || '').toLowerCase(),
        pref: s.p,
        lines: s.l,
      });
    }
    RouterV3.loadBinary(bin, meta, graph.stations, fares);
    const nTrips = meta.trips.l.length;
    document.getElementById('badge').textContent = `${graph.stats.stations}駅`;
    document.getElementById('status').textContent =
      `${graph.stats.stations}駅 / ${nTrips.toLocaleString()}本の列車 / オフライン対応`;
    document.getElementById('search-btn').disabled = false;
    console.log(`CSA loaded: ${RouterV3.data.nConn} connections, ${nTrips} trips`);
    initAutocomplete();
  } catch (e) {
    document.getElementById('status').textContent = 'データ読み込みエラー: ' + e.message;
  }
})();

// === Autocomplete ===
function searchStations(query) {
  if (!graph || query.length < 1) return [];
  const q = query.toLowerCase();
  const results = [];
  for (const s of graph._nameIndex) {
    if (s.name.includes(query) || s.nameEn.includes(q)) {
      results.push(s);
      if (results.length >= 12) break;
    }
  }
  results.sort((a, b) => {
    if (a.name === query && b.name !== query) return -1;
    if (b.name === query && a.name !== query) return 1;
    if (a.name.startsWith(query) && !b.name.startsWith(query)) return -1;
    if (b.name.startsWith(query) && !a.name.startsWith(query)) return 1;
    return a.name.length - b.name.length;
  });
  return results;
}

function initAutocomplete() {
  document.querySelectorAll('.field-row').forEach(setupFieldAC);
}

function setupFieldAC(row) {
  const input = row.querySelector('input');
  const dropdown = row.querySelector('.ac-dropdown');
  if (!input || !dropdown) return;

  const fieldId = input.closest('.field-row').dataset.role + '-' +
    Array.from(document.querySelectorAll('.field-row')).indexOf(input.closest('.field-row'));

  input.dataset.fieldId = fieldId;

  input.addEventListener('input', () => {
    delete selectedStations[input.dataset.fieldId];
    const results = searchStations(input.value);
    if (results.length === 0 || !input.value) {
      dropdown.classList.remove('show');
      return;
    }
    dropdown.innerHTML = results.map(s => `
      <div class="ac-item" data-id="${s.id}">
        <div>
          <div class="ac-name">${s.name}</div>
          <div class="ac-sub">${s.pref ? s.pref + ' / ' : ''}${s.lines.length ? s.lines[0] : ''}</div>
        </div>
      </div>
    `).join('');
    dropdown.classList.add('show');

    dropdown.querySelectorAll('.ac-item').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const id = parseInt(el.dataset.id);
        input.value = graph.stations[id].n;
        selectedStations[input.dataset.fieldId] = id;
        dropdown.classList.remove('show');
      });
    });
  });

  input.addEventListener('blur', () => {
    setTimeout(() => dropdown.classList.remove('show'), 150);
  });
}

// === Via Stations ===
let viaCount = 0;
function addVia() {
  if (viaCount >= 3) return;
  viaCount++;
  const arrRow = document.querySelector('[data-role="arr"]');
  const via = document.createElement('div');
  via.className = 'field-row';
  via.dataset.role = 'via';
  via.innerHTML = `
    <span class="field-label via">経</span>
    <div class="field-input">
      <input type="text" placeholder="経由駅" autocomplete="off">
      <button class="field-clear" onclick="clearField(this)">&times;</button>
      <div class="ac-dropdown"></div>
    </div>
    <button class="remove-via" onclick="removeVia(this)">&times;</button>
  `;
  arrRow.parentNode.insertBefore(via, arrRow);
  setupFieldAC(via);
  via.querySelector('input').focus();
}

function removeVia(btn) {
  const row = btn.closest('.field-row');
  const input = row.querySelector('input');
  if (input && input.dataset.fieldId) {
    delete selectedStations[input.dataset.fieldId];
  }
  row.remove();
  viaCount--;
}

function clearField(btn) {
  const input = btn.previousElementSibling;
  input.value = '';
  if (input.dataset.fieldId) delete selectedStations[input.dataset.fieldId];
  input.focus();
}

function swapDepArr() {
  const rows = document.querySelectorAll('.field-row');
  const depRow = rows[0];
  const arrRow = rows[rows.length - 1];
  const depInput = depRow.querySelector('input');
  const arrInput = arrRow.querySelector('input');
  const tmpVal = depInput.value;
  const tmpId = selectedStations[depInput.dataset.fieldId];
  depInput.value = arrInput.value;
  selectedStations[depInput.dataset.fieldId] = selectedStations[arrInput.dataset.fieldId];
  arrInput.value = tmpVal;
  selectedStations[arrInput.dataset.fieldId] = tmpId;
}

// Find all station IDs matching a name exactly
function findAllByName(name) {
  const strip = s => s.replace(/[（(].*?[）)]/g, '');
  const ids = [];
  for (let i = 0; i < graph.stations.length; i++) {
    if (graph.stations[i].n === name) ids.push(i);
  }
  if (!ids.length) { // fallback: 括弧サフィックス除去で照合（札幌(ＪＲ)等）
    for (let i = 0; i < graph.stations.length; i++) {
      if (strip(graph.stations[i].n) === strip(name)) ids.push(i);
    }
  }
  return ids;
}

// === Search ===
function saveOpts() {
  localStorage.setItem('routeOpts', JSON.stringify({
    express: document.getElementById('opt-express').checked,
    shinkansen: document.getElementById('opt-shinkansen').checked,
  }));
}
(function restoreOpts() {
  try {
    const o = JSON.parse(localStorage.getItem('routeOpts') || '{}');
    if (o.express === false) document.getElementById('opt-express').checked = false;
    if (o.shinkansen === false) document.getElementById('opt-shinkansen').checked = false;
  } catch (e) {}
})();

function doSearch() {
  const rows = document.querySelectorAll('.field-row');
  const waypointCandidates = [];

  for (const row of rows) {
    const input = row.querySelector('input');
    const fid = input.dataset.fieldId;
    const sid = selectedStations[fid];

    if (sid === undefined || sid === null) {
      const text = input.value.trim();
      if (!text) {
        if (row.dataset.role !== 'via') {
          alert(row.dataset.role === 'dep' ? '出発駅を選択してください' : '到着駅を選択してください');
          return;
        }
        continue;
      }
      const allIds = findAllByName(text);
      if (allIds.length > 0) {
        waypointCandidates.push(allIds);
      } else {
        const matches = searchStations(text);
        if (matches.length > 0) {
          const name = matches[0].name;
          waypointCandidates.push(findAllByName(name));
          input.value = name;
        } else {
          alert(`「${text}」が見つかりません`);
          return;
        }
      }
    } else {
      const name = graph.stations[sid].n;
      const allIds = findAllByName(name);
      waypointCandidates.push(allIds.length > 1 ? allIds : [sid]);
    }
  }

  if (waypointCandidates.length < 2) {
    alert('出発駅と到着駅を入力してください');
    return;
  }

  const st = getSearchTime();
  const opts = {
    express: document.getElementById('opt-express').checked,
    shinkansen: document.getElementById('opt-shinkansen').checked,
  };

  // 到着指定: 指定時刻までに着く最遅出発を二分探索
  function latestDeparture(f, t, arrBy) {
    let lo = arrBy - 480, hi = arrBy, best = null;
    const ok = j => j && j.arr <= arrBy;
    while (hi - lo > 1) {
      const mid = (lo + hi) >> 1;
      const j = RouterV3.query(f, t, mid, opts);
      if (ok(j)) { best = j; lo = j.dep > mid ? j.dep : mid; }
      else hi = mid;
      if (best && best.dep === lo && lo + 1 >= hi) break;
    }
    return best;
  }

  if (waypointCandidates.length === 2) {
    const journeys = [];
    const sigs = new Set();
    for (const fid of waypointCandidates[0]) {
      for (const tid of waypointCandidates[1]) {
        if (fid === tid) continue;
        let found;
        if (st.type === 'arr') {
          const j = latestDeparture(fid, tid, st.minutes);
          found = j ? [j] : [];
        } else {
          found = RouterV3.findJourneys(fid, tid, st.minutes, opts);
        }
        for (const j of found) {
          const sig = j.dep + '|' + j.arr + '|' +
            j.legs.map(l => l.kind === 'ride' ? l.line + l.dep : 'w').join('>');
          if (!sigs.has(sig)) { sigs.add(sig); journeys.push(j); }
        }
      }
    }
    journeys.sort((a, b) => {
      if (st.type === 'arr') {
        if (Math.abs(b.dep - a.dep) > 5) return b.dep - a.dep; // 遅く出る方
      }
      if (Math.abs(a.arr - b.arr) > 5) return a.arr - b.arr;
      if (Math.abs(b.dep - a.dep) > 5) return b.dep - a.dep;
      return a.transfers - b.transfers;
    });
    if (!journeys.length) {
      const fn = graph.stations[waypointCandidates[0][0]].n;
      const tn = graph.stations[waypointCandidates[1][0]].n;
      document.getElementById('results').innerHTML =
        `<div class="no-route">${fn} → ${tn} の経路が見つかりません</div>`;
      return;
    }
    renderMultipleResults(journeys);
  } else {
    // 経由駅: 区間ごとに最早到着を連結
    let combined = null;
    let depMin = st.minutes;
    for (let i = 0; i < waypointCandidates.length - 1; i++) {
      let best = null;
      for (const fid of waypointCandidates[i]) {
        for (const tid of waypointCandidates[i + 1]) {
          if (fid === tid) continue;
          const j = RouterV3.query(fid, tid, depMin, opts);
          if (j && (!best || j.arr < best.arr)) best = j;
        }
      }
      if (!best) {
        document.getElementById('results').innerHTML =
          `<div class="no-route">経路が見つかりません</div>`;
        return;
      }
      if (!combined) combined = best;
      else {
        combined.legs.push(...best.legs);
        combined.arr = best.arr;
        combined.transfers += best.transfers + 1;
      }
      depMin = best.arr + 4;
    }
    renderMultipleResults([combined]);
  }
}

function formatTime(minutes) {
  const h = Math.floor(minutes / 60) % 24;
  const m = minutes % 60;
  return `${String(h).padStart(2,'0')}:${String(Math.round(m)).padStart(2,'0')}`;
}

function getSearchTime() {
  const type = document.getElementById('time-type').value;
  const timeInput = document.getElementById('time-input').value;

  if (type === 'now' || !timeInput) {
    const now = new Date();
    return { type: 'dep', minutes: now.getHours() * 60 + now.getMinutes() };
  }

  const [h, m] = timeInput.split(':').map(Number);
  return { type, minutes: h * 60 + m };
}

// Line color hash for visual distinction
const LINE_COLORS = [
  '#2563eb', '#dc2626', '#16a34a', '#9333ea', '#ea580c',
  '#0891b2', '#be185d', '#4f46e5', '#ca8a04', '#059669',
];
function lineColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
  return LINE_COLORS[Math.abs(hash) % LINE_COLORS.length];
}

// === Rendering (journey = RouterV3.findJourneys の結果) ===
function renderOneRoute(j, index) {
  const depStr = formatTime(j.dep);
  const arrStr = formatTime(j.arr);
  const totalMin = j.arr - j.dep;
  const km = RouterV3.journeyKm(j);
  const fare = RouterV3.journeyFare(j);
  const rides = j.legs.filter(l => l.kind === 'ride');

  const routeId = 'route-' + index;
  let html = `<div class="route-card">`;

  html += `<div class="route-summary" onclick="toggleRoute('${routeId}')" style="cursor:pointer">
    <div style="flex:1">
      <div style="font-size:20px;font-weight:700;color:var(--blue)">${depStr} → ${arrStr}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:2px">${totalMin}分 / ${j.transfers > 0 ? j.transfers + '回乗換' : '直通'} / ${km.toFixed(1)}km</div>
    </div>
    <div style="font-size:18px;font-weight:700;color:var(--text)">¥${fare.total.toLocaleString()}</div>
  </div>`;

  // Line summary bar
  const totalStops = rides.reduce((s, l) => s + l.stops.length - 1, 0) || 1;
  html += `<div style="display:flex;height:4px;margin:0 16px 8px;border-radius:2px;overflow:hidden">`;
  for (const l of rides) {
    const pct = ((l.stops.length - 1) / totalStops * 100).toFixed(1);
    html += `<div style="width:${pct}%;background:${lineColor(l.line)}"></div>`;
  }
  html += `</div>`;

  const lineNames = rides.map(l =>
    `<span class="line-tag" style="background:${lineColor(l.line)}11;color:${lineColor(l.line)};margin:2px">${l.line}</span>`
  ).join('→');
  html += `<div style="padding:0 16px 10px;font-size:12px;line-height:1.8">${lineNames}</div>`;

  const collapsed = index > 0 ? ' collapsed' : '';
  html += `<div class="route-detail${collapsed}" id="${routeId}">`;

  let prevArr = null;
  for (let li = 0; li < j.legs.length; li++) {
    const leg = j.legs[li];
    if (leg.kind === 'walk') {
      const fn = graph.stations[leg.from].n, tn = graph.stations[leg.to].n;
      html += `<div class="step">
        <div class="step-line"><div class="step-dot walk"></div><div class="step-bar walk"></div></div>
        <div class="step-content">
          <div class="step-station" style="font-size:13px">${fn} → ${tn}</div>
          <div class="step-info">徒歩 約${leg.min}分</div>
        </div>
      </div>`;
      if (prevArr != null) prevArr += leg.min;
      continue;
    }
    const fromStn = graph.stations[leg.from], toStn = graph.stations[leg.to];
    const color = lineColor(leg.line);
    const wait = prevArr != null ? leg.dep - prevArr : 0;
    html += `<div class="step">
      <div class="step-line">
        <div class="step-dot" style="background:${color};box-shadow:0 0 0 2px ${color}"></div>
        <div class="step-bar" style="background:${color}"></div>
      </div>
      <div class="step-content">
        <div class="step-station"><span style="color:var(--muted);font-size:12px;margin-right:6px">${formatTime(leg.dep)}</span>${fromStn.n}</div>
        <div class="step-info">
          <span class="line-tag" style="background:${color}11;color:${color}">${leg.line}</span>
          ${leg.type ? `<span style="font-size:11px;color:var(--orange);font-weight:600">${leg.type}</span>` : ''}
          ${leg.dest ? `<span style="font-size:11px">${leg.dest}行</span>` : ''}
          ${leg.stops.length - 1}駅 ${leg.arr - leg.dep}分${wait > 0 ? ` <span style="color:var(--orange)">(待${wait}分)</span>` : ''}
        </div>
      </div>
    </div>`;
    prevArr = leg.arr;
  }
  const lastLeg = j.legs[j.legs.length - 1];
  const goalStn = graph.stations[lastLeg.to];
  html += `<div class="step">
    <div class="step-line"><div class="step-dot end"></div><div class="step-bar none"></div></div>
    <div class="step-content">
      <div class="step-station"><span style="color:var(--muted);font-size:12px;margin-right:6px">${formatTime(j.arr)}</span>${goalStn.n}</div>
      <div class="step-info">到着</div>
    </div>
  </div>`;

  html += `</div></div>`;
  return html;
}

let allFoundRoutes = [];
function renderMultipleResults(routes) {
  allFoundRoutes = routes;
  const showCount = Math.min(3, routes.length);
  let html = '';
  if (routes.length > 1) {
    html += `<div style="padding:4px 16px 0;font-size:13px;color:var(--muted)">${routes.length}件の経路</div>`;
  }
  for (let i = 0; i < showCount; i++) {
    html += renderOneRoute(routes[i], i);
  }
  if (routes.length > showCount) {
    html += `<button onclick="showMoreRoutes()" id="show-more-btn" style="
      width:calc(100% - 24px);margin:0 12px 12px;padding:12px;
      background:white;border:1px solid var(--border);border-radius:10px;
      font-size:14px;color:var(--blue);cursor:pointer;font-weight:500;
    ">さらに${routes.length - showCount}件表示</button>`;
  }
  document.getElementById('results').innerHTML = html;
}

function showMoreRoutes() {
  let html = `<div style="padding:4px 16px 0;font-size:13px;color:var(--muted)">${allFoundRoutes.length}件の経路</div>`;
  for (let i = 0; i < allFoundRoutes.length; i++) {
    html += renderOneRoute(allFoundRoutes[i], i);
  }
  document.getElementById('results').innerHTML = html;
}

function toggleRoute(routeId) {
  const el = document.getElementById(routeId);
  if (!el) return;
  el.classList.toggle('collapsed');
}

// === Service Worker + Offline ===
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'activated') {
          document.getElementById('status').textContent += ' (更新完了)';
        }
      });
    });
  });

  // Request persistent storage
  if (navigator.storage && navigator.storage.persist) {
    navigator.storage.persist().then(granted => {
      if (granted) {
        console.log('Persistent storage granted');
      } else {
        console.log('Persistent storage denied - cache may be evicted');
      }
    });
  }

  // Check offline readiness
  window.addEventListener('load', async () => {
    if ('caches' in window) {
      const cache = await caches.open('transit-v9');
      const keys = await cache.keys();
      const statusEl = document.getElementById('status');
      if (keys.length >= 4) { // index.html + graph.json + frequency.json + through_service.json minimum
        statusEl.textContent = statusEl.textContent.replace('オフライン対応', 'オフライン準備完了');
        statusEl.style.color = '#16a34a';
      }
    }
  });
}

// Online/offline indicator
window.addEventListener('online', () => {
  document.getElementById('status').style.color = '';
});
window.addEventListener('offline', () => {
  document.getElementById('status').textContent = 'オフラインモード';
  document.getElementById('status').style.color = '#ea580c';
});
